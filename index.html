<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Мемоплекс — нові українські меми</title>
<meta name="description" content="Свіжі українські меми — тварини, IT, спорт, локальні. Стрічка оновлюється щохвилини.">
<meta name="theme-color" content="#0E5C55">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #FAFBF9; font-family: Manrope, system-ui, sans-serif; }
  * { box-sizing: border-box; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn { from { opacity: 0; transform: scale(.96) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="reddit.jsx"></script>
<script type="text/babel" src="feed-magazine.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const [memes, setMemes] = React.useState(null);
  const [error, setError] = React.useState(null);

  React.useEffect(() => {
    let alive = true;
    fetchAllMemes()
      .then(list => { if (alive) setMemes(list); })
      .catch(err => {
        console.warn('Reddit недоступний, fallback на мок:', err);
        if (alive) { setMemes(MEMES); setError('Reddit тимчасово недоступний — показано демо-контент.'); }
      });
    return () => { alive = false; };
  }, []);

  if (!memes) return <Loader />;
  return (
    <>
      {error && <Banner text={error} />}
      <FeedMagazine density="cozy" radius={17} accent="#0E5C55" memes={memes} />
    </>
  );
}

function Loader() {
  return (
    <div style={{
      minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center',
      flexDirection: 'column', gap: 18, color: '#0E5C55', fontFamily: 'Manrope, system-ui, sans-serif',
    }}>
      <div style={{
        width: 32, height: 32, border: '3px solid rgba(14,92,85,.15)',
        borderTopColor: '#0E5C55', borderRadius: '50%', animation: 'spin .8s linear infinite',
      }} />
      <div style={{ fontSize: 14, fontWeight: 500 }}>Збираємо свіжі меми…</div>
    </div>
  );
}

function Banner({ text }) {
  return (
    <div style={{
      background: '#FFF1EE', color: '#7A1F38', padding: '10px 16px',
      fontSize: 13, fontWeight: 500, textAlign: 'center',
      borderBottom: '1px solid rgba(122,31,56,.15)',
      fontFamily: 'Manrope, system-ui, sans-serif',
    }}>{text}</div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
